name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "starlight/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Main
        uses: actions/checkout@v6

      - name: Validate content tree
        run: |
          if [ ! -d "starlight/src/content/docs" ]; then
            echo "::error::Missing content docs directory: starlight/src/content/docs"
            exit 1
          fi

          echo "Content ready at starlight/src/content/docs"
          find starlight/src/content/docs -maxdepth 2 -type f | head -n 30

      - name: Install, build, and upload site
        uses: withastro/action@v6
        with:
          path: starlight

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
